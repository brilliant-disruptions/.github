name: Slack PR Notification

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":arrow_heading_up: *New PR opened*\n*<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>*\nby `${{ github.event.pull_request.user.login }}` in `${{ github.repository }}`"
            }
